# Gitleaks config for eslint-plugin-mcp-security.
#
# This repo intentionally contains base64-encoded strings in tests/ as
# injection fixtures. Allowlist them so gitleaks doesn't flag them as
# secrets.

title = "eslint-plugin-mcp-security gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Test fixtures contain intentional base64 strings"
paths = [
  '''tests/.*\.test\.js$''',
]
