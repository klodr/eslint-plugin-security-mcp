name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: klodr/.github/.github/actions/setup-node-mcp@cfc709297722fd29bb9e66a3d0f13529ba4d6295
        with:
          node-version: "22"
          package-manager: "npm"

      - uses: klodr/.github/.github/actions/lint-format@cfc709297722fd29bb9e66a3d0f13529ba4d6295
        with:
          package-manager: "npm"
          run-format-check: "false"

  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        node: ["22", "24"]
    steps:
      - uses: klodr/.github/.github/actions/setup-node-mcp@cfc709297722fd29bb9e66a3d0f13529ba4d6295
        with:
          node-version: ${{ matrix.node }}
          package-manager: "npm"

      - name: Test
        if: matrix.node != '22'
        run: npm test

      - name: Test with coverage
        if: matrix.node == '22'
        run: npm run test:coverage

      - if: matrix.node == '22'
        uses: klodr/.github/.github/actions/codecov-upload@cfc709297722fd29bb9e66a3d0f13529ba4d6295
        with:
          slug: klodr/eslint-plugin-mcp-security
