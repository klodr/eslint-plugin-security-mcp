name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: klodr/.github/.github/workflows/reusable-node-ci.yml@63627d28c0e716176f24f06f4d3cad6c1abf3648
    permissions:
      contents: read
      id-token: write
    with:
      enable-build-step: false
      run-format-check: false
      build-test-job-name: "Test"
      enable-codecov-test-analytics: false
      codecov-slug: "klodr/eslint-plugin-security-mcp"
