name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: klodr/.github/.github/workflows/reusable-node-ci.yml@3cff28796830bc3ed5fd0ff801663ffe4407466c # main @ 2026-07-04 (v7.0.0 real commit)
    permissions:
      contents: read
      id-token: write
    with:
      enable-build-step: false
      run-format-check: false
      build-test-job-name: "Test"
      enable-codecov-test-analytics: false
      codecov-slug: "klodr/eslint-plugin-security-mcp"
