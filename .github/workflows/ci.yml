name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: klodr/.github/.github/workflows/reusable-node-ci.yml@31517bee59b358945f7af0fdb3960085e0f3ec78
    permissions:
      contents: read
      id-token: write
    with:
      enable-build-step: false
      run-format-check: false
      build-test-job-name: 'Test'
      enable-codecov-test-analytics: false
      codecov-slug: 'klodr/eslint-plugin-security-mcp'
